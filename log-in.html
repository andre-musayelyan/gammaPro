<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="./log-in.css">
</head>
<body>

<div class="container">
    <form class="card">
        <h1>Create Account</h1>
        <p class="subtitle">Մուտք գործիր քո տվյալներով</p>

        <div class="input-group">
            <label>Անուն</label>
            <input type="text" required>
        </div>

        <div class="input-group">
            <label>Տարիք</label>
            <input type="number" required>
        </div>

        <div class="input-group">
            <label>Ծննդյան ամիս</label>
            <select required>
                <option value="">Ընտրել ամիսը</option>
                <option>Հունվար</option>
                <option>Փետրվար</option>
                <option>Մարտ</option>
                <option>Ապրիլ</option>
                <option>Մայիս</option>
                <option>Հունիս</option>
                <option>Հուլիս</option>
                <option>Օգոստոս</option>
                <option>Սեպտեմբեր</option>
                <option>Հոկտեմբեր</option>
                <option>Նոյեմբեր</option>
                <option>Դեկտեմբեր</option>
            </select>
        </div>

        <div class="input-group">
            <label>Գաղտնաբառ</label>
            <input type="password" required>
        </div>

        <button type="submit">Մուտք գործել</button>
    </form>
</div>

</body>
</html>
